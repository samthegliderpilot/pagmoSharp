name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0-beta.6) — overrides tag when run manually'
        required: false
      dry_run:
        description: 'Assemble and inject nupkg but skip GitHub Release and NuGet push'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─── Windows: build native DLL + pack NuGet (Windows runtime only) ────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth 1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-${{ hashFiles('pagmoNet/ports/**', 'pagmoNet/triplets/**', 'ports/**', 'triplets/**') }}
          restore-keys: vcpkg-windows-

      - name: Resolve version
        id: ver
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $manual = '${{ github.event.inputs.version }}'
          $v = if ($manual) { $manual } else { $tag }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build release artifacts
        run: |
          pwsh scripts/build-release-artifacts.ps1 `
            -Version ${{ steps.ver.outputs.VERSION }} `
            -Configuration Release `
            -SkipReleaseGates
        shell: pwsh

      - name: Run tests
        run: |
          $env:PATH = "$(Resolve-Path pagmoNet\native\win-build);$env:PATH"
          dotnet test Tests/Tests.Pagmo.NET/Tests.Pagmo.NET.csproj -p:Platform=x64 --logger "console;verbosity=minimal"
        shell: pwsh

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nuget-windows
          path: artifacts/release/${{ steps.ver.outputs.VERSION }}/nuget/

      - name: Upload Windows native bundle
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: artifacts/release/${{ steps.ver.outputs.VERSION }}/native/win-x64/

  # ─── Linux: build libPagmoWrapper.so ──────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential swig curl zip unzip tar \
            autoconf autoconf-archive automake libtool

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install PowerShell
        run: |
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-linux-${{ hashFiles('pagmoNet/ports/**', 'pagmoNet/triplets/**', 'ports/**', 'triplets/**') }}
          restore-keys: vcpkg-linux-

      - name: Build native library
        run: pwsh scripts/build-native.ps1 -Configuration Release

      - name: Run tests
        run: dotnet test Tests/Tests.Pagmo.NET/Tests.Pagmo.NET.csproj -p:Platform=x64 --logger "console;verbosity=minimal"

      - name: Upload Linux native
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: pagmoNet/native/build/libPagmoWrapper.so

  # ─── macOS universal: build arm64 natively, cross-compile x86_64, lipo ───────
  # Runs entirely on macos-latest (Apple Silicon). Cross-compiling x86_64 on arm64
  # is fully supported by the macOS SDK — no Intel runner needed.
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: brew install autoconf autoconf-archive automake libtool swig

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ~/vcpkg --depth 1
          ~/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ~/vcpkg/installed
          key: vcpkg-macos-${{ hashFiles('pagmoNet/ports/**', 'pagmoNet/triplets/**', 'ports/**', 'triplets/**') }}
          restore-keys: vcpkg-macos-

      - name: Build arm64 slice (native)
        run: pwsh scripts/build-native.ps1 -Configuration Release

      - name: Run tests (arm64)
        run: |
          export DYLD_LIBRARY_PATH="$(pwd)/pagmoNet/native/build:$DYLD_LIBRARY_PATH"
          dotnet test Tests/Tests.Pagmo.NET/Tests.Pagmo.NET.csproj -p:PlatformTarget=AnyCPU --logger "console;verbosity=minimal"

      - name: Copy arm64 slice
        run: cp pagmoNet/native/build/libPagmoWrapper.dylib libPagmoWrapper-arm64.dylib

      - name: Install x86_64 vcpkg packages
        run: |
          $HOME/vcpkg/vcpkg install "pagmo2[nlopt]:x64-osx-static-pic" \
            "--overlay-triplets=triplets/" \
            "--overlay-ports=ports/" \
            "--recurse"

      - name: Build x86_64 slice (cross-compile)
        run: |
          cmake \
            -B pagmoNet/native/build-x64 \
            -S pagmoNet/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-osx-static-pic \
            -DVCPKG_OVERLAY_TRIPLETS=pagmoNet/triplets/ \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DPAGMONET_WITH_NLOPT=ON
          cmake --build pagmoNet/native/build-x64 --config Release

      - name: Create universal binary
        run: |
          lipo -create \
            libPagmoWrapper-arm64.dylib \
            pagmoNet/native/build-x64/libPagmoWrapper.dylib \
            -output libPagmoWrapper.dylib
          codesign --sign - libPagmoWrapper.dylib
          lipo -info libPagmoWrapper.dylib

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-universal
          path: libPagmoWrapper.dylib

  # ─── Release: merge natives, create GitHub release, push to NuGet ─────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install PowerShell
        run: |
          source /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O ms-prod.deb
          sudo dpkg -i ms-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Resolve version
        id: ver
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $manual = '${{ github.event.inputs.version }}'
          $v = if ($manual) { $manual } else { $tag }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Download Windows nupkg
        uses: actions/download-artifact@v4
        with:
          name: nuget-windows
          path: nuget/

      - name: Download Linux native
        uses: actions/download-artifact@v4
        with:
          name: native-linux
          path: native-linux/

      - name: Download macOS universal native
        uses: actions/download-artifact@v4
        with:
          name: native-macos-universal
          path: native-macos/

      - name: Inject Linux .so and macOS .dylib into nupkg
        run: |
          Add-Type -AssemblyName "System.IO.Compression"
          Add-Type -AssemblyName "System.IO.Compression.FileSystem"
          $nupkg = "nuget/Pagmo.NET.${{ steps.ver.outputs.VERSION }}.nupkg"

          $zip = [System.IO.Compression.ZipFile]::Open($nupkg, [System.IO.Compression.ZipArchiveMode]::Update)
          try {
            foreach ($entry in @(
              @{ file = "native-linux/libPagmoWrapper.so";  path = "runtimes/linux-x64/native/libPagmoWrapper.so" },
              @{ file = "native-macos/libPagmoWrapper.dylib"; path = "runtimes/osx/native/libPagmoWrapper.dylib" }
            )) {
              $existing = $zip.GetEntry($entry.path)
              if ($existing) { $existing.Delete() }
              [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                $zip, $entry.file, $entry.path,
                [System.IO.Compression.CompressionLevel]::Optimal) | Out-Null
              Write-Host "Injected $($entry.path)"
            }
          } finally {
            $zip.Dispose()
          }
        shell: pwsh

      - name: Upload assembled nupkg (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-final
          path: nuget/Pagmo.NET.${{ steps.ver.outputs.VERSION }}.nupkg

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "nuget/Pagmo.NET.${{ steps.ver.outputs.VERSION }}.nupkg" \
            "nuget/Pagmo.NET.${{ steps.ver.outputs.VERSION }}.snupkg" \
            --title "Pagmo.NET ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to NuGet.org
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        run: |
          dotnet nuget push "nuget/Pagmo.NET.${{ steps.ver.outputs.VERSION }}.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
